name: Refresh LoL Data

on:
  schedule:
    - cron: '0 6 * * 3'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run fetch-data
      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: refresh LoL data to latest patch'
          title: 'Refresh LoL data to latest patch'
          body: 'Automated weekly data refresh from Data Dragon + Community Dragon.'
          branch: data/refresh
          delete-branch: true
